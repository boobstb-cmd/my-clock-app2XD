name: Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Обновлено до v4 (использует Node 24 во внутренней логике)
      - uses: actions/checkout@v4
      
      # Явно ставим Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Ставим Flutter (без него flet build apk часто падает на чистом сервере)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Ставим Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Устанавливаем сам Flet
      - name: Install Flet
        run: pip install flet

      # Запускаем сборку
      - name: Build Android APK
        run: flet build apk

      # Сохраняем готовый файл
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-clock-apk
          path: build/apk/*.apk
